<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX-5DR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #ffffff;
    color: #374151;
    overflow: hidden;
    -webkit-app-region: drag;
  }

  .shell {
    width: min(860px, calc(100vw - 40px));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    transform: translateY(4vh);
  }

  .startup-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0, 0, 0, 0.1);
    border-top-color: #006FEE;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .text {
    margin-top: 16px;
    font-size: 14px;
    opacity: 0.7;
    text-align: center;
  }

  .log-preview {
    width: min(680px, calc(100vw - 40px));
    margin-top: 10px;
    padding: 7px 10px;
    border: 0;
    border-radius: 7px;
    background: transparent;
    color: rgba(55, 65, 81, 0.54);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 10px;
    line-height: 1.4;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: default;
    -webkit-app-region: no-drag;
  }

  .log-preview:hover {
    background: rgba(17, 24, 39, 0.045);
    color: rgba(55, 65, 81, 0.72);
  }

  .shell.logs-expanded .log-preview {
    display: none;
  }

  .startup-error {
    position: relative;
    display: none;
    width: min(560px, 100%);
    padding: 14px 16px;
    overflow: hidden;
    border-radius: 10px;
    background: rgba(220, 38, 38, 0.075);
    color: #991b1b;
    text-align: left;
    -webkit-app-region: no-drag;
  }

  .startup-mark.has-error .spinner,
  .startup-mark.has-error .text {
    display: none;
  }

  .startup-mark.has-error .startup-error {
    display: block;
  }

  .startup-error-icon {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 76px;
    height: 76px;
    color: #dc2626;
    opacity: 0.13;
    pointer-events: none;
  }

  .startup-error-title {
    position: relative;
    font-size: 15px;
    line-height: 1.35;
    font-weight: 600;
    padding-right: 72px;
  }

  .startup-error-message {
    position: relative;
    margin-top: 6px;
    padding-right: 72px;
    font-size: 12px;
    line-height: 1.5;
    color: rgba(153, 27, 27, 0.78);
  }

  .startup-error-detail {
    margin-top: 8px;
    font-size: 11px;
    line-height: 1.45;
    color: rgba(153, 27, 27, 0.64);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .startup-error-detail:empty {
    display: none;
  }

  .startup-error-actions {
    position: relative;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .startup-error-actions:empty {
    display: none;
  }

  .startup-error-action {
    padding: 5px 10px;
    border: 0;
    border-radius: 6px;
    background: rgba(220, 38, 38, 0.16);
    color: #991b1b;
    font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    cursor: default;
    -webkit-app-region: no-drag;
  }

  .startup-error-action:hover {
    background: rgba(220, 38, 38, 0.22);
  }

  .log-wrap {
    position: relative;
    display: none;
    width: 100%;
  }

  .shell.logs-expanded .log-wrap {
    display: block;
  }

  .open-logs-button {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 1;
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border: 0;
    border-radius: 5px;
    background: rgba(17, 24, 39, 0.06);
    color: rgba(55, 65, 81, 0.58);
    cursor: default;
    -webkit-app-region: no-drag;
  }

  .open-logs-button svg {
    width: 14px;
    height: 14px;
  }

  .open-logs-button:hover {
    background: rgba(17, 24, 39, 0.09);
    color: rgba(55, 65, 81, 0.72);
  }

  .log-card {
    width: 100%;
    height: min(42vh, 320px);
    padding: 28px 12px 10px;
    overflow: auto;
    border: 0;
    border-radius: 8px;
    background: rgba(17, 24, 39, 0.035);
    color: rgba(55, 65, 81, 0.68);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 10px;
    line-height: 1.4;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    -webkit-app-region: no-drag;
  }

  .log-card.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
  }

  .log-line {
    display: block;
    min-height: 1.4em;
  }

  .log-line.startup-problem {
    margin: 0 -4px;
    padding: 0 4px;
    border-radius: 4px;
    background: rgba(220, 38, 38, 0.07);
    color: rgba(153, 27, 27, 0.78);
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: #000000;
      color: #a1a1aa;
    }

    .spinner {
      border-color: rgba(255, 255, 255, 0.1);
      border-top-color: #3b82f6;
    }

    .startup-error {
      background: rgba(248, 113, 113, 0.11);
      color: #fca5a5;
    }

    .startup-error-icon {
      color: #f87171;
      opacity: 0.14;
    }

    .startup-error-message {
      color: rgba(254, 202, 202, 0.8);
    }

    .startup-error-detail {
      color: rgba(254, 202, 202, 0.62);
    }

    .startup-error-action {
      background: rgba(248, 113, 113, 0.16);
      color: #fecaca;
    }

    .startup-error-action:hover {
      background: rgba(248, 113, 113, 0.23);
    }

    .log-card {
      background: rgba(255, 255, 255, 0.055);
      color: rgba(212, 212, 216, 0.66);
    }

    .log-preview {
      color: rgba(212, 212, 216, 0.54);
    }

    .log-preview:hover {
      background: rgba(255, 255, 255, 0.075);
      color: rgba(212, 212, 216, 0.72);
    }

    .open-logs-button {
      background: rgba(255, 255, 255, 0.075);
      color: rgba(212, 212, 216, 0.54);
    }

    .open-logs-button:hover {
      background: rgba(255, 255, 255, 0.11);
      color: rgba(212, 212, 216, 0.72);
    }

    .log-card.empty {
      color: #71717a;
    }

    .log-line.startup-problem {
      background: rgba(248, 113, 113, 0.1);
      color: rgba(254, 202, 202, 0.82);
    }
  }

  @media (max-width: 640px) {
    .shell {
      width: calc(100vw - 24px);
      transform: translateY(2vh);
    }

    .log-card {
      height: 48vh;
      font-size: 9px;
    }

    .log-preview {
      width: calc(100vw - 24px);
    }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="startup-mark">
      <div class="spinner"></div>
      <div class="text" id="loading-text">Starting...</div>
      <button class="log-preview" id="log-preview" type="button">Waiting for log output...</button>
      <div class="startup-error" id="startup-error" role="alert">
        <svg class="startup-error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3 2.8 19h18.4L12 3z"></path>
          <path d="M12 9v4"></path>
          <path d="M12 17h.01"></path>
        </svg>
        <div class="startup-error-title" id="startup-error-title"></div>
        <div class="startup-error-message" id="startup-error-message"></div>
        <div class="startup-error-detail" id="startup-error-detail"></div>
        <div class="startup-error-actions" id="startup-error-actions"></div>
      </div>
    </div>
    <div class="log-wrap">
      <button class="open-logs-button" id="open-logs-button" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5h4l2 2h7A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
        </svg>
      </button>
      <pre class="log-card empty" id="log-card">Waiting for log output...</pre>
    </div>
  </div>
  <script>
    const zh = (navigator.language || '').toLowerCase().startsWith('zh');
    const text = {
      loading: zh ? '正在启动...' : 'Starting...',
      waiting: zh ? '等待日志输出...' : 'Waiting for log output...',
      unavailable: zh ? '日志接口不可用' : 'Startup log API unavailable',
      openLogs: zh ? '打开日志目录' : 'Open log folder',
    };
    document.getElementById('loading-text').textContent = text.loading;

    const startupMark = document.querySelector('.startup-mark');
    const startupErrorTitle = document.getElementById('startup-error-title');
    const startupErrorMessage = document.getElementById('startup-error-message');
    const startupErrorDetail = document.getElementById('startup-error-detail');
    const startupErrorActions = document.getElementById('startup-error-actions');
    const shell = document.querySelector('.shell');
    const logPreview = document.getElementById('log-preview');
    const logCard = document.getElementById('log-card');
    const openLogsButton = document.getElementById('open-logs-button');
    logPreview.setAttribute('aria-label', text.waiting);
    logPreview.setAttribute('title', text.waiting);
    openLogsButton.setAttribute('aria-label', text.openLogs);
    openLogsButton.setAttribute('title', text.openLogs);
    const MAX_RENDERED_LINES = 300;
    let lines = [];
    let isExpanded = false;
    let unsubscribe = null;

    function renderLines() {
      shell.classList.toggle('logs-expanded', isExpanded);
      const latestLine = lines.length > 0 ? lines[lines.length - 1].text : text.waiting;
      logPreview.textContent = latestLine;
      logPreview.setAttribute('aria-label', latestLine);
      logPreview.setAttribute('title', latestLine);
      if (!isExpanded) {
        return;
      }

      const shouldStick = logCard.scrollHeight - logCard.scrollTop - logCard.clientHeight < 32;
      logCard.textContent = '';
      if (lines.length === 0) {
        logCard.classList.add('empty');
        logCard.textContent = text.waiting;
        return;
      }

      logCard.classList.remove('empty');
      for (const line of lines) {
        const node = document.createElement('span');
        node.className = getLogLineClassName(line.text);
        node.textContent = line.text;
        logCard.appendChild(node);
      }

      if (shouldStick) {
        logCard.scrollTop = logCard.scrollHeight;
      }
    }

    // STARTUP_LOG_CLASSIFIER_START
    function getLogLineClassName(value) {
      const baseClassName = 'log-line';
      const problemClassName = `${baseClassName} startup-problem`;

      if (/\[\s*error\s*\]/i.test(value)) {
        return problemClassName;
      }

      if (!/\[child:[^\]]+\]/i.test(value)) {
        return baseClassName;
      }

      if (/(failed to start|node binary not found|entry not found|stop timeout|force kill)/i.test(value)) {
        return problemClassName;
      }

      if (!/\bexited\b/i.test(value)) {
        return baseClassName;
      }

      const code = (value.match(/\bcode=([^\s]+)/i)?.[1] || '').replace(/[,\]]+$/, '').toLowerCase();
      const signal = (value.match(/\bsignal=([^\s]+)/i)?.[1] || '').replace(/[,\]]+$/, '').toLowerCase();
      const hasBadCode = Boolean(code) && code !== '0' && code !== 'null' && code !== 'undefined';
      const hasBadSignal = Boolean(signal) && signal !== 'null' && signal !== 'undefined' && signal !== 'none';

      return hasBadCode || hasBadSignal ? problemClassName : baseClassName;
    }
    // STARTUP_LOG_CLASSIFIER_END

    function renderStartupError(error) {
      if (!error) {
        startupMark.classList.remove('has-error');
        startupErrorTitle.textContent = '';
        startupErrorMessage.textContent = '';
        startupErrorDetail.textContent = '';
        startupErrorActions.textContent = '';
        return;
      }

      startupMark.classList.add('has-error');
      isExpanded = true;
      startupErrorTitle.textContent = error.title || '';
      startupErrorMessage.textContent = error.message || '';
      startupErrorDetail.textContent = error.detail || '';
      startupErrorActions.textContent = '';

      for (const action of error.actions || []) {
        const button = document.createElement('button');
        button.className = 'startup-error-action';
        button.type = 'button';
        button.textContent = action.label || action.id;
        button.addEventListener('click', () => runStartupErrorAction(action.id));
        startupErrorActions.appendChild(button);
      }
    }

    async function runStartupErrorAction(actionId) {
      const api = window.electronAPI && window.electronAPI.startupLogs;
      if (!api || typeof api.runAction !== 'function') {
        console.warn('Startup error action API unavailable');
        return;
      }

      try {
        await api.runAction(actionId);
      } catch (error) {
        console.warn('Failed to run startup error action', actionId, error);
      }
    }

    function applyPayload(payload) {
      renderStartupError(payload.startupError);

      if (payload.snapshot) {
        lines = payload.lines || [];
      } else if (payload.lines && payload.lines.length > 0) {
        lines = lines.concat(payload.lines);
      }
      if (lines.length > MAX_RENDERED_LINES) {
        lines = lines.slice(-MAX_RENDERED_LINES);
      }
      renderLines();
    }

    async function subscribeLogs() {
      const api = window.electronAPI && window.electronAPI.startupLogs;
      if (!api || typeof api.subscribe !== 'function') {
        lines = [{ text: text.unavailable }];
        renderLines();
        return;
      }

      try {
        unsubscribe = await api.subscribe(applyPayload);
      } catch (error) {
        lines = [{
          text: `${text.unavailable}: ${error && error.message ? error.message : String(error)}`,
        }];
        renderLines();
      }
    }

    window.addEventListener('beforeunload', () => {
      if (unsubscribe) {
        void unsubscribe();
        unsubscribe = null;
      }
    });

    openLogsButton.addEventListener('click', async () => {
      const api = window.electronAPI && window.electronAPI.startupLogs;
      if (!api || typeof api.openFolder !== 'function') {
        console.warn('Startup log folder API unavailable');
        return;
      }

      try {
        await api.openFolder();
      } catch (error) {
        console.warn('Failed to open startup log folder', error);
      }
    });

    logPreview.addEventListener('click', () => {
      isExpanded = true;
      renderLines();
    });

    renderLines();
    void subscribeLogs();
  </script>
</body>
</html>
