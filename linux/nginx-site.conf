# TX-5DR Nginx Site Configuration (Shared Template)
# Used by both native deb/rpm and Docker deployments.
#
# Variables (replaced by sed at install/build time):
#   %%LISTEN_PORT%%  — HTTP listen port (native: 8076, Docker: 80)
#   %%WEB_ROOT%%     — Path to web static files
#   %%API_HOST%%     — Backend API host:port (typically 127.0.0.1:4000)

# WebSocket upgrade map (must be in http context, before server block)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen %%LISTEN_PORT%%;
    server_name _;
    client_max_body_size 128M;

    # Frontend static files (SPA)
    location / {
        root %%WEB_ROOT%%;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Realtime compatibility WebSocket proxy
    location /api/realtime/ws-compat {
        proxy_pass http://%%API_HOST%%;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connect/send short so stalled upstream surfaces fast; read long for idle WS
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 7d;
    }

    # Realtime WebRTC DataChannel signaling proxy
    location /api/realtime/rtc-data-audio {
        proxy_pass http://%%API_HOST%%;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Signaling stays open while the PeerConnection is alive.
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 7d;
    }

    # API proxy
    location /api/ {
        proxy_pass http://%%API_HOST%%;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy
    location /api/ws {
        proxy_pass http://%%API_HOST%%;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connect/send short so stalled upstream surfaces fast; read long for idle WS
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 7d;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
